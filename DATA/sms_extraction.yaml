task: sms_extraction
dataset_path: json
dataset_kwargs:
  data_files:
    test: /workspaces/pF_slm_selection/DATA/extraction_ds.jsonl
output_type: generate_until
test_split: test

doc_to_text: !function utils.doc_to_text
doc_to_target: "{{expected}}"

generation_kwargs:
  until:
    - "\n\n"
    - "</s>"
    - "<|im_end|>"
    - "<|endoftext|>"
    - "<end_of_turn>"
  do_sample: false
  temperature: 0.0
  max_gen_toks: 256

filter_list:
  - name: "extract_json"
    filter:
      - function: "custom"
        filter_fn: !function utils.extract_json_filter
      - function: "take_first"

metric_list:
  # ── Existing (kept for backward-compat with prior runs) ──
  - metric: !function utils.json_validity
    aggregation: mean
    higher_is_better: true
  - metric: !function utils.rejection_accuracy
    aggregation: mean
    higher_is_better: true
  - metric: !function utils.field_accuracy
    aggregation: mean
    higher_is_better: true
  - metric: !function utils.amount_accuracy
    aggregation: mean
    higher_is_better: true
  # ── Tier 1: per-field + end-to-end ──────────────────────
  - metric: !function utils.type_accuracy
    aggregation: mean
    higher_is_better: true
  - metric: !function utils.account_accuracy
    aggregation: mean
    higher_is_better: true
  - metric: !function utils.full_match_accuracy
    aggregation: mean
    higher_is_better: true
  - metric: !function utils.ghost_transaction_rate
    aggregation: mean
    higher_is_better: false
  # ── Tier 2: diagnostics ──────────────────────────────────
  - metric: !function utils.missed_transaction_rate
    aggregation: mean
    higher_is_better: false
  - metric: !function utils.date_accuracy
    aggregation: mean
    higher_is_better: true
  - metric: !function utils.merchant_accuracy
    aggregation: mean
    higher_is_better: true
  # ── Tier 3: hallucination detector ──────────────────────
  - metric: !function utils.few_shot_leakage_rate
    aggregation: mean
    higher_is_better: false
